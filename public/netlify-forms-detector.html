<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Netlify Forms Detector</title></head>
<body>
  <!--
    This file exists solely so Netlify's build bot can detect the form
    definition at build time. The React component is client-rendered and
    invisible to the bot; this static copy registers the form.
    Do not delete this file.
  -->
  <form name="website_form" netlify netlify-honeypot="website" hidden>
    <input type="text"     name="name"         />
    <input type="text"     name="businessName" />
    <select               name="businessType" ></select>
    <textarea             name="timewaster"   ></textarea>
    <input type="text"    name="contact"      />
    <input type="text"    name="website"      />
  </form>
</body>
</html>

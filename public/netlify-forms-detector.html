<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Netlify Forms Detector</title></head>
<body>
  <!--
    This file exists solely so Netlify's build bot can detect the form
    definition at build time. The React component is client-rendered and
    invisible to the bot; this static copy registers the form.
    Do not delete this file.
  -->
  <form name="contact_form" netlify netlify-honeypot="website" hidden>
    <input type="text"     name="full_name"         />
    <input type="text"     name="business_name" />
    <select               name="business_type" ></select>
    <textarea             name="time_waster"   ></textarea>
    <input type="text"    name="form_contact"      />
    <input type="text"    name="form_website"      />
  </form>
</body>
</html>
